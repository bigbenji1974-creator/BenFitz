<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
#bf-drag-gallery-wrap{
position:relative;
height:80vh;
overflow:hidden;
background:#111;
margin:0;
}

#bf-image-track{
display:flex;
gap:30px;
position:absolute;
left:50%;
top:50%;
transform:translate(0,-50%);
user-select:none;
}

#bf-image-track img{
width:350px;
height:500px;
flex-shrink:0;
object-fit:cover;
border-radius:12px;
pointer-events:none;
}
</style>
</head>
<body>

<section id="bf-drag-gallery-wrap">
<div id="bf-image-track">

<img src="https://images.unsplash.com/photo-1505515888495-c1897b0b5740?q=80&w=1740&auto=format&fit=crop">
<img src="https://images.unsplash.com/photo-1521464302861-ce943915d1c3?q=80&w=1742&auto=format&fit=crop">
<img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=1740&auto=format&fit=crop">
<img src="https://images.unsplash.com/photo-1496293455970-f8581aae0e3b?q=80&w=2013&auto=format&fit=crop">
<img src="https://images.unsplash.com/photo-1517784229726-7b866d820438?q=80&w=1733&auto=format&fit=crop">
<img src="https://images.unsplash.com/photo-1481414981591-5732874c7193?q=80&w=1746&auto=format&fit=crop">
<img src="https://images.unsplash.com/photo-1625794084867-8ddd239946b1?q=80&w=1740&auto=format&fit=crop">

</div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function(){

const track=document.getElementById("bf-image-track");

let mouseDownAt=0;
let prevPercentage=0;

function down(x){
mouseDownAt=x;
}

function up(){
mouseDownAt=0;
prevPercentage=parseFloat(track.dataset.percentage||0);
}

function move(x){

if(mouseDownAt===0) return;

const mouseDelta=mouseDownAt-x;
const maxDelta=window.innerWidth/2;

const percentage=(mouseDelta/maxDelta)*-100;

const next=Math.max(
Math.min(prevPercentage+percentage,0),
-100
);

track.dataset.percentage=next;

track.style.transform=
`translate(${next}%, -50%)`;

}

window.addEventListener("mousedown",e=>down(e.clientX));
window.addEventListener("mouseup",up);
window.addEventListener("mousemove",e=>move(e.clientX));

});
</script>

</body>
</html>
